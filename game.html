<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Driver Pro - Ultimate</title>

<style>
body { margin:0; background:#87CEEB; overflow:hidden; font-family:sans-serif; }
canvas { display:block; margin:0 auto; background:#2ecc71; border:4px solid #333; }

#ui {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    text-align:center;
    text-shadow:2px 2px 4px #000;
}

#controls {
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    display:flex;
    justify-content:space-around;
}

button {
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    font-weight:bold;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 100</div>
    <div id="speed">0 km/h</div>
    <div id="notice"></div>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="controls">
    <button id="left">←</button>
    <button id="right">→</button>
    <button id="accel">▲</button>
    <button id="brake">■</button>
</div>

<script>
// ===== INPUT =====
class InputManager {
    constructor() {
        this.keys = {};
        this.bind();
    }

    bind() {
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);

        const map = {
            left: 'ArrowLeft',
            right: 'ArrowRight',
            accel: 'ArrowUp',
            brake: 'Space'
        };

        Object.entries(map).forEach(([id, key]) => {
            const el = document.getElementById(id);

            el.addEventListener('touchstart', () => this.keys[key] = true);
            el.addEventListener('touchend', () => this.keys[key] = false);

            el.addEventListener('mousedown', () => this.keys[key] = true);
            el.addEventListener('mouseup', () => this.keys[key] = false);
        });
    }
}

// ===== AUDIO =====
class AudioManager {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.lastNote = 0;
        this.melody = [261,293,329,349,392,329,261,392];
    }

    unlock() {
        if (this.ctx.state === 'suspended') this.ctx.resume();
    }

    play(freq, duration=0.2, vol=0.1) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.frequency.value = freq;
        gain.gain.value = vol;

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playSiren() {
        this.play(800,0.1,0.1);
        setTimeout(()=>this.play(1000,0.1,0.1),100);
    }

    updateBGM() {
        const now = this.ctx.currentTime;
        if (now - this.lastNote > 0.4) {
            const i = Math.floor(now / 0.4) % this.melody.length;
            this.play(this.melody[i],0.25,0.05);
            this.lastNote = now;
        }
    }
}

// ===== TRAFFIC LIGHT =====
class TrafficLight {
    constructor(y) {
        this.y = y;
        this.state = "red";
        this.timer = 0;
        this.stopLineOffset = 130;
    }

    update(speed) {
        this.y += speed;
        this.timer++;

        if (this.state === "red" && this.timer > 300) {
            this.state = "green";
            this.timer = 0;
        } else if (this.state === "green" && this.timer > 200) {
            this.state = "red";
            this.timer = 0;
        }
    }

    draw(ctx) {
        ctx.fillStyle = "#222";
        ctx.fillRect(340, this.y, 30, 80);

        ctx.fillStyle = this.state === "red" ? "red" : "#444";
        ctx.beginPath();
        ctx.arc(355, this.y+20, 10, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = this.state === "green" ? "#0f0" : "#444";
        ctx.beginPath();
        ctx.arc(355, this.y+60, 10, 0, Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(0, this.y + this.stopLineOffset);
        ctx.lineTo(400, this.y + this.stopLineOffset);
        ctx.stroke();
    }

    isViolation(playerY, speed) {
        const lineY = this.y + this.stopLineOffset;
        return (
            this.state === "red" &&
            lineY > playerY - 50 &&
            lineY < playerY + 30 &&
            speed > 0.5
        );
    }

    isPassed() {
        return this.y > 600;
    }

    reset(y) {
        this.y = y;
        this.state = "red";
        this.timer = 0;
    }
}

// ===== GAME =====
class Game {
    constructor(canvas) {
        this.ctx = canvas.getContext('2d');

        this.player = { x:200, y:500 };
        this.speed = 0;
        this.score = 100;
        this.offset = 0;

        this.npcs = [];
        this.spawnTimer = 0;

        this.notice = "";
        this.noticeTimer = 0;

        this.input = new InputManager();
        this.audio = new AudioManager();
        this.light = new TrafficLight(-1200);

        // crash
        this.crashed = false;
        this.crashTimer = 0;
        this.shakePower = 0;
        this.particles = [];

        // ambulance
        this.ambulance = null;

        this.loop = this.loop.bind(this);
    }

    start() {
        document.addEventListener('click', () => this.audio.unlock(), { once:true });
        requestAnimationFrame(this.loop);
    }

    spawnNPC() {
        this.spawnTimer++;
        if (this.spawnTimer > 60) {
            this.npcs.push({
                x:100 + Math.random()*200,
                y:-100,
                baseSpeed:1 + Math.random()*2,
                currentSpeed:0
            });
            this.spawnTimer = 0;
        }
    }

    spawnAmbulance() {
        if (this.ambulance || Math.random() > 0.002) return;

        this.ambulance = {
            x: this.player.x,
            y: this.player.y + 200,
            speed: 6
        };

        this.showNotice("🚑 Give Way!");
    }

    triggerCrash(npc) {
        this.crashed = true;
        this.crashTimer = 120;
        this.speed = 0;
        this.score = Math.max(0, this.score - 30);
        this.audio.play(80,0.5,0.3);
        this.showNotice("💥 ACCIDENT!");
        this.shakePower = 10;

        for (let i=0;i<15;i++) {
            this.particles.push({
                x:this.player.x,
                y:this.player.y,
                vx:(Math.random()-0.5)*5,
                vy:(Math.random()-0.5)*5,
                life:30
            });
        }

        npc.currentSpeed = 0;
    }

    showNotice(msg) {
        this.notice = msg;
        this.noticeTimer = 60;
    }

    update() {
        if (this.crashed) {
            this.crashTimer--;
            if (this.crashTimer <= 0) this.crashed = false;
        }

        const keys = this.input.keys;

        if (!this.crashed) {
            if (keys['ArrowUp']) this.speed += 0.2;
            else if (keys['Space']) this.speed -= 0.4;
            else this.speed *= 0.98;
        }

        this.speed = Math.max(0, Math.min(this.speed, 8));

        if (keys['ArrowLeft']) this.player.x -= 4;
        if (keys['ArrowRight']) this.player.x += 4;

        this.offset += this.speed;

        this.spawnNPC();
        this.spawnAmbulance();

        const lightLine = this.light.y + this.light.stopLineOffset;

        this.npcs.forEach((n,i) => {
            const approaching = n.y < lightLine - 20 && n.y > lightLine - 120;

            if (this.light.state === "red" && approaching) {
                n.currentSpeed *= 0.9;
            } else {
                n.currentSpeed += (n.baseSpeed - n.currentSpeed) * 0.05;
            }

            // 車間距離
            const front = this.npcs[i-1];
            if (front && Math.abs(n.y - front.y) < 60) {
                n.currentSpeed = Math.min(n.currentSpeed, front.currentSpeed);
            }

            n.y += n.currentSpeed + this.speed*0.5;

            if (!this.crashed &&
                Math.abs(this.player.x - n.x) < 40 &&
                Math.abs(this.player.y - n.y) < 50) {
                this.triggerCrash(n);
            }
        });

        this.npcs = this.npcs.filter(n => n.y < 700);

        // traffic light
        this.light.update(this.speed);

        if (this.light.isViolation(this.player.y, this.speed)) {
            this.speed = 0;
            this.showNotice("STOP! Red Light!");
            this.audio.play(120,0.3,0.2);
        }

        if (this.light.isPassed()) this.light.reset(-1500);

        // ambulance
        if (this.ambulance) {
            const a = this.ambulance;
            a.y -= a.speed;

            if (Math.random() < 0.05) this.audio.playSiren();

            const givingWay = this.player.x < 120 || this.player.x > 280;

            if (!givingWay &&
                Math.abs(this.player.y - a.y) < 80) {
                this.score = Math.max(0, this.score - 20);
                this.showNotice("❗ Give Way!");
            }

            if (a.y < -100) this.ambulance = null;
        }

        // particles
        this.particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        });
        this.particles = this.particles.filter(p => p.life > 0);

        if (this.noticeTimer > 0) this.noticeTimer--;

        if (this.shakePower > 0) this.shakePower *= 0.9;

        this.audio.updateBGM();
    }

    render() {
        const ctx = this.ctx;

        let shakeX = (Math.random()-0.5)*this.shakePower;
        let shakeY = (Math.random()-0.5)*this.shakePower;

        ctx.save();
        ctx.translate(shakeX, shakeY);

        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(0,0,400,600);

        ctx.fillStyle = "#34495e";
        ctx.beginPath();
        ctx.moveTo(100,0);
        ctx.lineTo(300,0);
        ctx.lineTo(400,600);
        ctx.lineTo(0,600);
        ctx.fill();

        ctx.strokeStyle = "#fff";
        ctx.setLineDash([30,40]);
        ctx.lineDashOffset = -this.offset;
        ctx.beginPath();
        ctx.moveTo(200,0);
        ctx.lineTo(200,600);
        ctx.stroke();
        ctx.setLineDash([]);

        this.light.draw(ctx);

        ctx.font = "40px serif";
        this.npcs.forEach(n => ctx.fillText("🚗", n.x, n.y));

        if (this.ambulance) {
            ctx.font = "50px serif";
            ctx.fillText("🚑", this.ambulance.x, this.ambulance.y);
        }

        ctx.font = "50px serif";
        ctx.fillText("🏍️", this.player.x, this.player.y);

        this.particles.forEach(p => {
            ctx.fillStyle = "orange";
            ctx.fillRect(p.x, p.y, 4, 4);
        });

        ctx.restore();

        if (this.noticeTimer > 0) {
            ctx.fillStyle = "yellow";
            ctx.font = "20px sans-serif";
            ctx.fillText(this.notice, 200, 100);
        }

        document.getElementById("score").innerText = "Score: " + this.score;
        document.getElementById("speed").innerText = Math.floor(this.speed*10) + " km/h";
    }

    loop() {
        this.update();
        this.render();
        requestAnimationFrame(this.loop);
    }
}

// ===== START =====
const game = new Game(document.getElementById("gameCanvas"));
game.start();
</script>

</body>
</html>

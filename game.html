<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Driver Complete</title>

<style>
body { margin:0; background:#222; font-family:sans-serif; text-align:center; }
canvas { background:#2ecc71; display:block; margin:0 auto; }

.overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
}

#controls {
  position: fixed;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

#controls button {
  width: 70px;
  height: 70px;
  font-size: 20px;
  border-radius: 50%;
  border: none;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<div id="start" class="overlay">
  <h2>🚦 Safety Driver</h2>
  <button onclick="startGame()">START</button>
</div>

<div id="controls">
  <button ontouchstart="press('left')" ontouchend="release('left')">⬅</button>
  <button ontouchstart="press('right')" ontouchend="release('right')">➡</button>
  <button ontouchstart="press('brake')" ontouchend="release('brake')">🔴</button>
  <button ontouchstart="press('gas')" ontouchend="release('gas')">🟢</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const game = {
  state: "menu",
  score: 100,
  speed: 0,
  playerX: 200,
  npcs: [],
  signalY: -300,
  signalColor: "red",
  timer: 0,
  passed: 0,
  goal: 5
};

const input = { left:false, right:false, gas:false, brake:false };

function press(k){ input[k]=true; }
function release(k){ input[k]=false; }

window.addEventListener("touchend", ()=>{
  input.left=false; input.right=false;
  input.gas=false; input.brake=false;
});

let lastTime = 0;

// ================= START =================
function startGame(){
  document.getElementById("start").style.display="none";
  game.state="play";
  requestAnimationFrame(loop);
}

// ================= LOOP =================
function loop(time){
  const d = (time - lastTime)/16;
  lastTime = time;

  update(d);
  draw();

  if(game.state==="play") requestAnimationFrame(loop);
}

// ================= UPDATE =================
function update(d){

  // 操作
  if(input.gas) game.speed += 0.25*d;
  else if(input.brake) game.speed -= 0.4*d;
  else game.speed -= 0.05*d;

  game.speed = Math.max(0, Math.min(10, game.speed));

  if(input.left) game.playerX -= 4*d;
  if(input.right) game.playerX += 4*d;

  // NPC生成
  if(game.npcs.length < 3){
    game.npcs.push({
      x: Math.random()*350,
      y: -50,
      speed: 2,
      hit:false
    });
  }

  // NPC更新
  game.npcs.forEach(n=>{
    n.y += game.speed + n.speed;

    if(!n.hit && collide(game.playerX,520,n.x,n.y)){
      n.hit = true;
      game.score -= 5;
    }
  });

  game.npcs = game.npcs.filter(n=>n.y < 600);

  // ===== 信号 =====
  game.signalY += game.speed;
  game.timer++;

  if(game.timer > 180){
    game.signalColor = game.signalColor==="red" ? "green":"red";
    game.timer = 0;
  }

  let stopLine = game.signalY + 100;

  // 赤信号違反
  if(
    game.signalColor==="red" &&
    stopLine > 450 && stopLine < 550 &&
    game.speed > 1
  ){
    endGame("🚫 Vượt đèn đỏ!");
  }

  // 通過
  if(game.signalY > 600){
    game.signalY = -300;
    game.signalColor="red";
    game.passed++;
  }

  // スコア
  if(game.speed > 0) game.score += 0.05*d;

  // ゴール
  if(game.passed >= game.goal){
    clearGame();
  }

  if(game.score <= 0){
    endGame("Hết điểm!");
  }
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,400,600);

  // プレイヤー
  ctx.font="40px serif";
  ctx.fillText("🏍️", game.playerX, 520);

  // NPC
  game.npcs.forEach(n=>{
    ctx.fillText("🚗", n.x, n.y);
  });

  // 信号
  ctx.fillStyle="black";
  ctx.fillRect(350, game.signalY, 20, 60);

  ctx.fillStyle = game.signalColor==="red" ? "red":"#333";
  ctx.beginPath();
  ctx.arc(360, game.signalY+15, 8, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = game.signalColor==="green" ? "lime":"#333";
  ctx.beginPath();
  ctx.arc(360, game.signalY+45, 8, 0, Math.PI*2);
  ctx.fill();

  let stopLine = game.signalY + 100;

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(0, stopLine);
  ctx.lineTo(400, stopLine);
  ctx.stroke();

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+Math.floor(game.score), 10, 30);
  ctx.fillText("Goal: "+game.passed+"/"+game.goal, 10, 60);
}

// ================= COLLISION =================
function collide(ax, ay, bx, by){
  return Math.abs(ax-bx)<40 && Math.abs(ay-by)<50;
}

// ================= GAME OVER =================
function endGame(msg){
  game.state="end";

  const div=document.createElement("div");
  div.className="overlay";
  div.innerHTML=`
    <h2>GAME OVER</h2>
    <p>${msg}</p>
    <p>Score: ${Math.floor(game.score)}</p>
    <button onclick="location.reload()">Retry</button>
  `;
  document.body.appendChild(div);
}

// ================= CLEAR =================
function clearGame(){
  game.state="clear";

  const div=document.createElement("div");
  div.className="overlay";
  div.innerHTML=`
    <h2>🎉 CLEAR</h2>
    <p>Hoàn thành!</p>
    <p>Score: ${Math.floor(game.score)}</p>
    <button onclick="location.reload()">Play again</button>
  `;
  document.body.appendChild(div);
}
</script>

</body>
</html>

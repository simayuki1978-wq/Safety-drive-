<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Driver Pro - Game Giáo Dục</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #2ecc71; margin: 0 auto; border: 4px solid #333; width: 100%; max-width: 400px; height: auto; }
        
        .overlay { position: absolute; top:0; left:50%; transform: translateX(-50%); width: 100%; max-width: 400px; height: 100%; background: rgba(0,0,0,0.9); color: white; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #ui-layer { position: absolute; top: 10px; left:50%; transform: translateX(-50%); width: 100%; max-width: 400px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 5; text-align: center; }
        
        /* 操作ボタン */
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; display: flex; justify-content: space-around; z-index: 15; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-weight: bold; color: white; user-select: none; font-size: 12px; cursor: pointer; }
        .btn-move { background: rgba(255,255,255,0.3); }
        .btn-accel { background: #4caf50; }
        .btn-brake { background: #d32f2f; }
        
        .hidden { display: none !important; }
        .item { font-size: 50px; cursor: grab; margin: 10px; display: inline-block; touch-action: none; }
    </style>
</head>
<body>

<div id="tutorial-screen" class="overlay" style="z-index: 30;">
    <h2 style="color: #ffeb3b;">Luật chơi An toàn</h2>
    <p>1. Trang bị đầy đủ<br>2. Nhấn Gas để đi, Thắng để dừng<br>3. Tuyệt đối không vượt đèn đỏ!</p>
    <button style="padding:10px 20px;" onclick="document.getElementById('tutorial-screen').classList.add('hidden')">Tôi đã hiểu</button>
</div>

<div id="prep-screen" class="overlay">
    <h2>Chuẩn bị hành trang</h2>
    <div id="item-box" style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 20px;">
        <span id="helmet" class="item" draggable="true" ondragstart="drag(event)">⛑️</span>
        <span id="shoes" class="item" draggable="true" ondragstart="drag(event)">👟</span>
        <span id="license" class="item" draggable="true" ondragstart="drag(event)">🪪</span>
    </div>
    <div id="drop-target" ondrop="drop(event)" ondragover="allowDrop(event)" 
         style="width: 150px; height: 150px; border: 4px dashed #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 80px;">👤</div>
    <p id="status-msg" style="color: #ffeb3b; margin: 10px;">Kéo đồ vào người 👤</p>
    <button id="start-btn" class="hidden" style="padding:15px 30px; background:#4caf50; color:white; border-radius:20px;" onclick="startGame()">BẮT ĐẦU</button>
</div>

<div id="ui-layer">
    <div id="rank-text">Cấp độ: Tập sự</div>
    <div id="score-text" style="font-size: 20px; font-weight: bold;">Điểm an toàn: 100</div>
    <div id="speed-text" style="color: #0f0;">Tốc độ: 0 km/h</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls" class="hidden">
    <button class="ctrl-btn btn-move" onmousedown="keys['ArrowLeft']=true" onmouseup="keys['ArrowLeft']=false" ontouchstart="keys['ArrowLeft']=true" ontouchend="keys['ArrowLeft']=false">Trái</button>
    <button class="ctrl-btn btn-move" onmousedown="keys['ArrowRight']=true" onmouseup="keys['ArrowRight']=false" ontouchstart="keys['ArrowRight']=true" ontouchend="keys['ArrowRight']=false">Phải</button>
    <button class="ctrl-btn btn-brake" onmousedown="keys['Space']=true" onmouseup="keys['Space']=false" ontouchstart="keys['Space']=true" ontouchend="keys['Space']=false">THẮNG<br>(Brake)</button>
    <button class="ctrl-btn btn-accel" onmousedown="keys['ArrowUp']=true" onmouseup="keys['ArrowUp']=false" ontouchstart="keys['ArrowUp']=true" ontouchend="keys['ArrowUp']=false">GA<br>(Gas)</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 600;

    let gameState = "wait"; 
    let score = 100;
    let equipmentCount = 0;
    let playerEmoji = '👨‍💼';
    let playerX = 280; // 右側車線
    let offset = 0;
    let speed = 0; 
    const maxSpeed = 12;
    const keys = {};

    let signalY = -100;
    let signalColor = "green";

    // キー入力
    window.addEventListener('keydown', e => { if(e.code==='Space') e.preventDefault(); keys[e.code] = true; });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // D&D
    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
    function drop(ev) {
        ev.preventDefault();
        var data = ev.dataTransfer.getData("text");
        document.getElementById(data).classList.add('hidden');
        equipmentCount++;
        document.getElementById('status-msg').innerText = `Đã chuẩn bị: ${equipmentCount}/3`;
        if (equipmentCount === 3) {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('drop-target').innerText = "✅";
        }
    }

    function startGame() {
        document.getElementById('prep-screen').classList.add('hidden');
        document.getElementById('controls').classList.remove('hidden');
        gameState = "playing";
        draw();
    }

    function draw() {
        if (gameState !== "playing") return;

        // 背景
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        // 道路
        ctx.fillStyle = "#34495e"; ctx.beginPath();
        ctx.moveTo(120, 0); ctx.lineTo(280, 0); ctx.lineTo(400, 600); ctx.lineTo(0, 600); ctx.fill();
        // 白線
        ctx.strokeStyle = "#fff"; ctx.setLineDash([30, 40]); ctx.lineDashOffset = -offset;
        ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 600); ctx.stroke();

        drawSignal();

        // プレイヤー
        ctx.textAlign = "center";
        ctx.font = "50px serif"; ctx.fillText("🏍️", playerX, 520);
        ctx.font = "35px serif"; ctx.fillText(playerEmoji, playerX, 490);

        update();
        requestAnimationFrame(draw);
    }

    function drawSignal() {
        ctx.fillStyle = "#333"; ctx.fillRect(350, signalY, 20, 60);
        ctx.beginPath(); ctx.arc(360, signalY+15, 8, 0, Math.PI*2);
        ctx.fillStyle = (signalColor === "red") ? "red" : "#555"; ctx.fill();
        ctx.beginPath(); ctx.arc(360, signalY+45, 8, 0, Math.PI*2);
        ctx.fillStyle = (signalColor === "green") ? "#0f0" : "#555"; ctx.fill();
    }

    function update() {
        // 加減速ロジック
        if (keys['ArrowUp']) { 
            speed += 0.2; // アクセル
        } else if (keys['Space']) { 
            speed -= 0.5; // ブレーキ
        } else { 
            speed -= 0.05; // 自然減速（空走）
        }

        if (speed < 0) speed = 0;
        if (speed > maxSpeed) speed = maxSpeed;

        // 左右移動（スピードが出ている時のみ大きく動ける）
        if (keys['ArrowLeft'] && playerX > 50) playerX -= (speed > 2 ? 5 : 2);
        if (keys['ArrowRight'] && playerX < 350) playerX += (speed > 2 ? 5 : 2);
        
        offset += speed;
        signalY += speed * 0.5;

        // 信号更新
        if (signalY > canvas.height) {
            signalY = -400;
            signalColor = Math.random() > 0.5 ? "red" : "green";
        }

        // 違反判定
        if (playerX < 150 && speed > 1) score -= 0.1; // 逆走
        if (signalColor === "red" && signalY > 350 && signalY < 450 && speed > 1) {
            gameOver("Bạn đã vượt đèn đỏ!");
        }

        document.getElementById('score-text').innerText = "Điểm an toàn: " + Math.floor(score);
        document.getElementById('speed-text').innerText = `Tốc độ: ${Math.floor(speed * 5)} km/h`;
    }

    function gameOver(msg) {
        gameState = "gameOver";
        alert("GAME OVER\n" + msg);
        location.reload();
    }
</script>
</body>
</html>

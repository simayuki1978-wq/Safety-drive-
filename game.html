<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = "wait";
let score = 100;
let speed = 0;
let playerX = 280;
let offset = 0;

let npcs = [];
const keys = {};

let lastTime = 0;

// =======================
// ① UI（alert削除）
// =======================
function showOverlay(title, msg) {
    const div = document.createElement("div");
    div.className = "overlay";
    div.innerHTML = `
        <h2>${title}</h2>
        <p>${msg}</p>
        <button onclick="location.reload()">Chơi lại</button>
    `;
    document.body.appendChild(div);
}

// =======================
// ② 衝突判定
// =======================
function isColliding(ax, ay, bx, by, w = 40, h = 50) {
    return (
        Math.abs(ax - bx) < w &&
        Math.abs(ay - by) < h
    );
}

// =======================
// NPC生成
// =======================
function spawnNPC() {
    if (npcs.length < 3) {
        npcs.push({
            x: 120 + Math.random() * 200,
            y: -100,
            speed: 2,
            collided: false
        });
    }
}

// =======================
// メインループ（④含む）
// =======================
function gameLoop(time) {
    if (gameState !== "playing") return;

    const delta = (time - lastTime) / 16;
    lastTime = time;

    update(delta);
    draw();

    requestAnimationFrame(gameLoop);
}

// =======================
// UPDATE
// =======================
function update(delta) {
    // スピード
    if (keys['ArrowUp']) speed += 0.2 * delta;
    else speed -= 0.1 * delta;

    speed = Math.max(0, Math.min(speed, 10));

    // 移動
    if (keys['ArrowLeft']) playerX -= 4 * delta;
    if (keys['ArrowRight']) playerX += 4 * delta;

    offset += speed;

    spawnNPC();

    // =======================
    // NPC処理（③ filter）
    // =======================
    npcs.forEach(npc => {
        npc.y += speed + npc.speed;

        // 衝突
        if (!npc.collided && isColliding(playerX, 520, npc.x, npc.y)) {
            npc.collided = true;
            score -= 5;
        }
    });

    // 画面外削除
    npcs = npcs.filter(npc => npc.y < canvas.height);

    // =======================
    // ④ スコア報酬
    // =======================
    if (speed > 0) {
        score += 0.02 * delta; // 安全運転ボーナス
    }

    // ゲームオーバー
    if (score <= 0) {
        gameState = "gameOver";
        showOverlay("GAME OVER", "Điểm đã hết!");
    }
}

// =======================
// DRAW
// =======================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤー
    ctx.font = "50px serif";
    ctx.fillText("🏍️", playerX, 520);

    // NPC
    ctx.font = "40px serif";
    npcs.forEach(npc => {
        ctx.fillText("🚗", npc.x, npc.y);
    });

    // スコア
    ctx.fillStyle = "white";
    ctx.fillText("Score: " + Math.floor(score), 10, 50);
}

// =======================
// START
// =======================
function startGame() {
    gameState = "playing";
    requestAnimationFrame(gameLoop);
}
</script>

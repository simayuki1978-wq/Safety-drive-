<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Driver Pro - Final Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #2ecc71; margin: 0 auto; border: 4px solid #333; width: 100%; max-width: 400px; height: auto; }
        
        /* 戻るボタン */
        #back-home { position: absolute; top: 10px; left: 10px; z-index: 100; padding: 8px 15px; background: #555; color: white; border-radius: 5px; text-decoration: none; font-size: 12px; }
        
        .overlay { position: absolute; top:0; left:50%; transform: translateX(-50%); width: 100%; max-width: 400px; height: 100%; background: rgba(0,0,0,0.95); color: white; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; text-align: center; }
        #ui-layer { position: absolute; top: 50px; left:50%; transform: translateX(-50%); width: 100%; max-width: 400px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 5; text-align: center; }
        
        /* アイテム操作設定 */
        .item { font-size: 50px; cursor: grab; margin: 10px; display: inline-block; transition: transform 0.2s; }
        .item:hover { transform: scale(1.1); }
        
        #drop-target { 
            width: 280px; height: 220px; 
            border: 5px dashed #fff; border-radius: 30px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin-bottom: 20px; background: rgba(255,255,255,0.1); position: relative;
        }
        /* 枠内の文字などはドラッグの邪魔をしない */
        #drop-target * { pointer-events: none; } 

        .course-btn { width: 100%; padding: 15px; margin: 8px 0; background: #3498db; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .course-btn:hover { background: #2ecc71; }

        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; display: flex; justify-content: space-around; z-index: 15; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-weight: bold; color: white; font-size: 12px; cursor: pointer; }
        .btn-move { background: rgba(255,255,255,0.4); }
        .btn-accel { background: #27ae60; box-shadow: 0 4px #1e8449; }
        .btn-brake { background: #e74c3c; box-shadow: 0 4px #c0392b; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<a href="index.html" id="back-home">◀ Quay lại Top</a>

<div id="prep-screen" class="overlay">
    <h2 style="margin-top: 0;">Chuẩn bị hành trang</h2>
    <div id="item-box">
        <span id="item-helmet" class="item" draggable="true" ondragstart="drag(event)" onclick="equip('helmet')" data-type="helmet">⛑️</span>
        <span id="item-shoes" class="item" draggable="true" ondragstart="drag(event)" onclick="equip('shoes')" data-type="shoes">👟</span>
        <span id="item-license" class="item" draggable="true" ondragstart="drag(event)" onclick="equip('license')" data-type="license">🪪</span>
    </div>
    
    <div id="drop-target" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
        <div id="equipped-helmet" style="font-size: 50px; opacity: 0; position: absolute; top: 10px;">⛑️</div>
        <div style="font-size: 80px;">👤</div>
        <div id="equipped-license" style="font-size: 40px; opacity: 0; position: absolute; right: 40px; top: 80px;">🪪</div>
        <div id="equipped-shoes" style="font-size: 50px; opacity: 0; position: absolute; bottom: 10px;">👟</div>
    </div>
    
    <p id="status-msg">Kéo thả hoặc Chạm vào đồ vật</p>
    
    <div id="course-selection" class="hidden" style="width: 100%;">
        <h3 style="color: #2ecc71;">Chọn đích đến</h3>
        <button class="course-btn" onclick="startGame(5, 'Trường học')">🏫 Trường học (5 ngã tư)</button>
        <button class="course-btn" onclick="startGame(10, 'Siêu thị')">🛒 Siêu thị (10 ngã tư)</button>
        <button class="course-btn" onclick="startGame(15, 'Trung tâm TM')">🏬 Trung tâm TM (15 ngã tư)</button>
    </div>
</div>

<div id="ui-layer">
    <div id="score-text" style="font-size: 24px; font-weight: bold;">Điểm: 100</div>
    <div id="progress-text" style="color: #f1c40f; font-size: 18px;">Ngã tư: 0 / 0</div>
    <div id="speed-text" style="color: #2ecc71; font-size: 16px;">0 km/h</div>
    <div id="signal-notice" style="font-size: 20px; font-weight: bold; margin-top: 10px; height: 30px;"></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls" class="hidden">
    <button class="ctrl-btn btn-move" onmousedown="keys['ArrowLeft']=true" onmouseup="keys['ArrowLeft']=false" ontouchstart="keys['ArrowLeft']=true" ontouchend="keys['ArrowLeft']=false">Trái</button>
    <button class="ctrl-btn btn-move" onmousedown="keys['ArrowRight']=true" onmouseup="keys['ArrowRight']=false" ontouchstart="keys['ArrowRight']=true" ontouchend="keys['ArrowRight']=false">Phải</button>
    <button class="ctrl-btn btn-brake" onmousedown="keys['Space']=true" onmouseup="keys['Space']=false" ontouchstart="keys['Space']=true" ontouchend="keys['Space']=false">THẮNG</button>
    <button class="ctrl-btn btn-accel" onmousedown="keys['ArrowUp']=true" onmouseup="keys['ArrowUp']=false" ontouchstart="keys['ArrowUp']=true" ontouchend="keys['ArrowUp']=false">GA</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 600;

    let gameState = "wait", score = 100, equipmentCount = 0, playerX = 200, offset = 0, speed = 0;
    const keys = {};

    let targetIntersections = 0, passedIntersections = 0, destinationName = "";
    let signalY = -1200, signalColor = "red", signalTimer = 0;
    const stopLineOffset = 130;

    let npcs = [], walkers = [], bonusItems = [];

    // --- 精密なドラッグ＆ドロップ ---
    function allowDrop(ev) { 
        ev.preventDefault(); 
        ev.currentTarget.style.background = "rgba(46, 204, 113, 0.3)";
        ev.currentTarget.style.borderColor = "#2ecc71";
    }
    function dragLeave(ev) { 
        ev.currentTarget.style.background = "rgba(255, 255, 255, 0.1)";
        ev.currentTarget.style.borderColor = "#fff";
    }
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.dataset.type); }
    function drop(ev) {
        ev.preventDefault();
        dragLeave(ev);
        equip(ev.dataTransfer.getData("text"));
    }

    function equip(type) {
        const source = document.getElementById('item-' + type);
        const target = document.getElementById('equipped-' + type);
        if (source && !source.classList.contains('hidden')) {
            source.classList.add('hidden');
            target.style.opacity = "1";
            equipmentCount++;
            if (equipmentCount >= 3) {
                document.getElementById('status-msg').classList.add('hidden');
                document.getElementById('course-selection').classList.remove('hidden');
            }
        }
    }

    function startGame(num, name) {
        targetIntersections = num; destinationName = name;
        document.getElementById('prep-screen').classList.add('hidden');
        document.getElementById('controls').classList.remove('hidden');
        gameState = "playing";
        draw();
    }

    // --- オブジェクト管理 ---
    function spawnAll() {
        if(npcs.length < 3) npcs.push({ x: 100 + Math.random()*200, y: -200, type: ["🚗","🚲","🚌","🛵"][Math.floor(Math.random()*4)], s: 1+Math.random()*2, c: false });
        if(walkers.length < 1 && Math.random() < 0.01) walkers.push({ x: -50, y: 150+Math.random()*300, c: false });
        if(bonusItems.length < 1 && Math.random() < 0.005) bonusItems.push({ x: 120+Math.random()*160, y: -100, type: Math.random()>0.5?"📱":"🎧", c: false });
    }

    function draw() {
        if (gameState !== "playing") return;
        
        // 背景と道路
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(0,0,400,600);
        ctx.fillStyle = "#34495e"; ctx.beginPath();
        ctx.moveTo(100,0); ctx.lineTo(300,0); ctx.lineTo(400,600); ctx.lineTo(0,600); ctx.fill();
        
        // 白線
        ctx.strokeStyle = "#fff"; ctx.setLineDash([30, 40]); ctx.lineDashOffset = -offset;
        ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(200,0); ctx.lineTo(200,600); ctx.stroke();
        
        // 停止線
        ctx.setLineDash([]); ctx.lineWidth = 12;
        ctx.beginPath(); ctx.moveTo(0, signalY+stopLineOffset); ctx.lineTo(400, signalY+stopLineOffset); ctx.stroke();

        // 信号機
        ctx.fillStyle = "#222"; ctx.fillRect(340, signalY, 30, 80);
        ctx.fillStyle = (signalColor==="red")?"red":"#444"; ctx.beginPath(); ctx.arc(355, signalY+20, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = (signalColor==="green")?"#0f0":"#444"; ctx.beginPath(); ctx.arc(355, signalY+60, 10, 0, Math.PI*2); ctx.fill();

        // キャラクター描画（発光効果）
        ctx.shadowBlur = 15; ctx.shadowColor = "white";
        ctx.textAlign = "center";
        npcs.forEach(n => { ctx.font = "45px serif"; ctx.fillText(n.type, n.x, n.y); });
        walkers.forEach(w => { ctx.font = "55px serif"; ctx.fillText("🚶", w.x, w.y); });
        bonusItems.forEach(i => { ctx.font = "40px serif"; ctx.fillText(i.type, i.x, i.y); });
        ctx.shadowBlur = 0;

        // プレイヤー
        ctx.font = "55px serif"; ctx.fillText("🏍️", playerX, 530);
        ctx.font = "35px serif"; ctx.fillText("👨‍💼", playerX, 500);

        update();
        requestAnimationFrame(draw);
    }

    function update() {
        if (keys['ArrowUp']) speed += 0.12; else if (keys['Space']) speed -= 0.4; else speed -= 0.04;
        speed = Math.max(0, Math.min(speed, 9));
        if (keys['ArrowLeft'] && playerX > 60) playerX -= 4.5;
        if (keys['ArrowRight'] && playerX < 340) playerX += 4.5;
        
        offset += speed; signalY += speed;
        spawnAll();

        // 信号機ルール
        if (signalColor === "red" && signalY + stopLineOffset > 380) {
            signalTimer++;
            document.getElementById('signal-notice').innerText = "ĐÈN ĐỎ! (" + Math.ceil((300-signalTimer)/60) + "s)";
            document.getElementById('signal-notice').style.color = "red";
            if (signalTimer > 300) { signalColor = "green"; signalTimer = 0; }
        } else if (signalColor === "green") {
            document.getElementById('signal-notice').innerText = "ĐÈN XANH!";
            document.getElementById('signal-notice').style.color = "#0f0";
        }

        // 信号リセット & ゴール判定
        if (signalY > 600) {
            signalY = -1200; signalColor = "red"; signalTimer = 0;
            passedIntersections++;
            if (passedIntersections >= targetIntersections) { gameClear(); return; }
        }

        // 衝突判定（慎重なエリア設定）
        npcs.forEach(n => {
            n.y += speed*0.4 + n.s;
            if(!n.c && Math.abs(playerX-n.x)<45 && Math.abs(530-n.y)<50) { n.c=true; score-=5; }
        });
        walkers.forEach(w => {
            w.x += 1.8; w.y += speed;
            if(!w.c && Math.abs(playerX-w.x)<50 && Math.abs(530-w.y)<60) { w.c=true; score-=10; }
        });
        bonusItems.forEach(i => {
            i.y += speed;
            if(!i.c && Math.abs(playerX-i.x)<40 && Math.abs(530-i.y)<40) {
                i.c=true; score-=10; alert("Không dùng điện thoại/tai nghe!");
            }
        });

        // 信号無視判定（停止線の直前〜少し後を監視）
        if (signalColor === "red" && (signalY+stopLineOffset) > 480 && (signalY+stopLineOffset) < 560 && speed > 0.4) {
            gameOver("Bạn đã vượt đèn đỏ!");
        }

        document.getElementById('score-text').innerText = "Điểm: " + Math.floor(score);
        document.getElementById('progress-text').innerText = `Ngã tư: ${passedIntersections} / ${targetIntersections}`;
        document.getElementById('speed-text').innerText = `${Math.floor(speed*7)} km/h`;
        if (score <= 0) gameOver("Hết điểm an toàn!");
    }

    function gameOver(m) { gameState="over"; alert(m); location.reload(); }
    function gameClear() { gameState="clear"; alert(`CHIẾN THẮNG!\nBạn đã đến ${destinationName}!\nĐiểm: ${Math.floor(score)}`); location.reload(); }
</script>
</body>
</html>
